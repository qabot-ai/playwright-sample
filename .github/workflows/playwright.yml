name: Run Playwright and Deploy Reports

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install deps
      run: npm ci

    - name: Install browsers
      run: npx playwright install --with-deps

    - name: Run tests
      run: npx playwright test
      continue-on-error: true

    - name: Copy reports locally
      run: |
        cp -r playwright-report/* /opt/playwright/AutomationReports/UI/
